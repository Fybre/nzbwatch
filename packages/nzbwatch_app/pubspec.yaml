name: nzbwatch
version: 0.1.0
publish_to: 'none'

description: Cross-platform NZB downloader and media streamer

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  drift: ^2.14.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18

  # FFI
  ffi: ^2.1.0

  # File system & paths
  path_provider: ^2.1.1
  path: ^1.8.3

  # Video playback
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # UI
  cupertino_icons: ^1.0.6

  # Utils
  http: ^1.1.0
  intl: ^0.19.0
  xml: ^6.5.0
  uuid: ^4.2.2
  equatable: ^2.0.5
  collection: ^1.18.0

  # Storage
  shared_preferences: ^2.2.2

  # Drag and drop
  desktop_drop: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  drift_dev: ^2.14.0

flutter:
  uses-material-design: true
