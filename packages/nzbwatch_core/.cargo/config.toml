# iOS targets need to explicitly link against libc++ to resolve C++ exception
# symbols (std::logic_error, std::length_error, etc.) from the unrar dependency
[target.aarch64-apple-ios]
rustflags = ["-C", "link-arg=-lc++"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-lc++"]

[target.x86_64-apple-ios]
rustflags = ["-C", "link-arg=-lc++"]
