[package]
name = "nzbwatch_core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
tokio = { version = "1.35", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.5"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
async-trait = "0.1"
parking_lot = "0.12"
dashmap = "5.5"
flume = "0.11"
regex = "1.10"
base64 = "0.21"
hex = "0.4"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
crc32fast = "1.3"
lazy_static = "1.4"
unrar = "0.5"
axum = "0.7"
axum-extra = { version = "0.9", features = ["typed-header"] }
headers = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors"] }
urlencoding = "2.1"

# FFI
flutter_rust_bridge = "2.0"

[dependencies.uuid]
version = "1.6"
features = ["v4", "serde"]

[dependencies.tokio-rustls]
version = "0.24"

[dependencies.rustls]
version = "0.21"
features = ["dangerous_configuration"]

[dependencies.rustls-native-certs]
version = "0.6"

[dependencies.webpki-roots]
version = "0.25"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
