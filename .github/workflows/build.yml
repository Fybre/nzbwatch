name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable iOS for CI
        run: |
          flutter config --no-enable-ios
          flutter config --list

      - name: Install macOS dependencies
        run: brew install create-dmg

      - name: Build Rust Core (macOS)
        run: ./scripts/build_rust.sh macos

      - name: Build Flutter (macOS)
        run: |
          cd packages/nzbwatch_app
          flutter pub get
          flutter build macos --release

      - name: Bundle and Sign macOS
        run: |
          APP_PATH="packages/nzbwatch_app/build/macos/Build/Products/Release/nzbwatch.app"
          LIB_PATH="packages/nzbwatch_core/target/release/libnzbwatch_core.dylib"
          PAR2_PATH="bin/macos/par2"
          
          # Ensure Frameworks directory exists
          mkdir -p "$APP_PATH/Contents/Frameworks"
          
          # Copy Rust Library
          cp "$LIB_PATH" "$APP_PATH/Contents/Frameworks/"
          cp "$LIB_PATH" "$APP_PATH/Contents/MacOS/"
          
          # Copy par2
          if [ -f "$PAR2_PATH" ]; then
            cp "$PAR2_PATH" "$APP_PATH/Contents/MacOS/"
            chmod +x "$APP_PATH/Contents/MacOS/par2"
          fi
          
          # Ad-hoc sign everything if no certificate
          if [ "${{ secrets.APPLE_CERTIFICATE_P12 }}" == "" ]; then
            codesign --force --sign - "$APP_PATH/Contents/Frameworks/libnzbwatch_core.dylib"
            codesign --force --sign - "$APP_PATH/Contents/MacOS/libnzbwatch_core.dylib"
            if [ -f "$APP_PATH/Contents/MacOS/par2" ]; then
              codesign --force --sign - "$APP_PATH/Contents/MacOS/par2"
            fi
            codesign --force --sign - "$APP_PATH"
          fi

      - name: Import Apple Certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASS: ${{ secrets.APPLE_CERTIFICATE_PASS }}
          APPLE_KEYCHAIN_PASS: ${{ secrets.APPLE_KEYCHAIN_PASS }}
        run: |
          echo $APPLE_CERTIFICATE_P12 | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASS" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASS" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASS" build.keychain

      - name: Code Sign with Certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        run: |
          APP_PATH="packages/nzbwatch_app/build/macos/Build/Products/Release/nzbwatch.app"
          codesign --force --options runtime --deep --sign "${{ secrets.APPLE_CERTIFICATE_NAME }}" "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="packages/nzbwatch_app/build/macos/Build/Products/Release/nzbwatch.app"
          mkdir -p dist
          create-dmg \
            --volname "NZBWatch Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "nzbwatch.app" 200 190 \
            --hide-extension "nzbwatch.app" \
            --app-drop-link 600 185 \
            "dist/NZBWatch-macOS.dmg" \
            "$APP_PATH"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nzbwatch-macos
          path: dist/NZBWatch-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Rust Core (Windows)
        run: ./scripts/build_rust.sh windows
        shell: bash

      - name: Build Flutter (Windows)
        run: |
          cd packages/nzbwatch_app
          flutter pub get
          flutter build windows --release

      - name: Bundle Windows Binaries
        run: |
          $RELEASE_DIR = "packages/nzbwatch_app/build/windows/x64/runner/Release"
          $DLL_PATH = "packages/nzbwatch_core/target/release/nzbwatch_core.dll"
          $PAR2_PATH = "bin/windows/par2.exe"

          if (Test-Path $DLL_PATH) {
            Copy-Item $DLL_PATH -Destination $RELEASE_DIR
          }
          if (Test-Path $PAR2_PATH) {
            Copy-Item $PAR2_PATH -Destination $RELEASE_DIR
          }
        shell: powershell

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nzbwatch-windows
          path: packages/nzbwatch_app/build/windows/x64/runner/Release/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Rust Core (Android)
        run: ./scripts/build_rust.sh android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Flutter (Android)
        run: |
          cd packages/nzbwatch_app
          flutter pub get
          flutter build apk --release

      - name: Rename Android APK
        run: |
          mkdir -p dist
          cp packages/nzbwatch_app/build/app/outputs/flutter-apk/app-release.apk \
            dist/NZBWatch-Android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nzbwatch-android
          path: dist/NZBWatch-Android.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        run: |
          mkdir -p dist
          (cd artifacts/nzbwatch-windows && zip -r ../../dist/NZBWatch-Windows.zip .)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nzbwatch-macos/NZBWatch-macOS.dmg
            dist/NZBWatch-Windows.zip
            artifacts/nzbwatch-android/NZBWatch-Android.apk
